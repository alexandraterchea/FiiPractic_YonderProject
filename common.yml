---
- name: Common configuration for all machines
  hosts: all
  become: true

  tasks:
    - name: Disable and stop firewalld
      service:
        name: firewalld
        state: stopped
        enabled: false

    - name: Set timezone to Europe/Bucharest
      timezone:
        name: Europe/Bucharest

    - name: Set PermitRootLogin to prohibit-password
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin\s+'
        line: 'PermitRootLogin prohibit-password'
        state: present
      notify: Restart sshd

    - name: Install docker
      package:
        name: docker
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Disable SELinux permanently
      lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=disabled'

    - name: Set SELinux to permissive in current session
      command: setenforce 0
      ignore_errors: true

  handlers:
    - name: Restart sshd
      service:
        name: sshd
        state: restarted

